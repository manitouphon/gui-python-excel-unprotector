name: Build and Release with Nuitka

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false # <--- CRITICAL: Prevents Linux failure from cancelling macOS/Windows
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # Forces the macOS/Linux runners to use the standard zlib module inside Actions instead of seeking outside python versions
      - name: Install required tools
        run: |
          python -m pip install --upgrade pip
          pip install nuitka zstandard 
          
      - name: Install C Compiler (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ccache gcc

      - name: Build Executable with Nuitka
        shell: bash
        env:
          NUITKA_ANSWERS: "yes"
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --remove-output \
            --disable-console \
            --enable-plugin=tk-inter \
            --jobs=1 \
            --lto=no \
            gui.py

      - name: Rename Binary for Clarity
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv gui.exe Excel-Unprotect-GUI-windows.exe
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            mv gui.bin Excel-Unprotect-GUI-macos
          else
            mv gui.bin Excel-Unprotect-GUI-linux
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: |
            Excel-Unprotect-GUI-windows.exe
            Excel-Unprotect-GUI-macos
            Excel-Unprotect-GUI-linux

  release:
    needs: build
    runs-on: ubuntu-latest
    if: success() # Only runs if the compilation jobs succeeded
    steps:
      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Excel-Unprotect-GUI-windows.exe
            Excel-Unprotect-GUI-macos
            Excel-Unprotect-GUI-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
