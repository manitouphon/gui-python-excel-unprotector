# This workflow will uses PyInstaller to compile and ship it as an executable
name: Build and Release Windows EXE

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when you push a version tag like v1.0.0

permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
jobs:
  build-and-release:
    runs-on: windows-latest  # Changes the build environment to Windows

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: pyinstaller --onefile --name="Excel-Unprotect-GUI" --noconsole gui.py

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/Excel-Unprotect-GUI.exe  # Targets the Windows executable file
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
