name: Build and Release with Nuitka

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install required tools
        run: |
          python -m pip install --upgrade pip
          pip install nuitka zstandard

      - name: Install C Compiler (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ccache gcc

      - name: Build Executable with Nuitka (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --remove-output \
            --windows-console-mode=disable \
            --enable-plugin=tk-inter \
            --jobs=1 \
            --lto=no \
            --assume-yes-for-downloads \
            -o Excel-Unprotect-GUI-windows.exe \
            gui.py

      - name: Build Executable with Nuitka (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --remove-output \
            --enable-plugin=tk-inter \
            --jobs=1 \
            --lto=no \
            --assume-yes-for-downloads \
            -o Excel-Unprotect-GUI-macos \
            gui.py

      - name: Build Executable with Nuitka (Linux)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --remove-output \
            --enable-plugin=tk-inter \
            --jobs=1 \
            --lto=no \
            --assume-yes-for-downloads \
            -o Excel-Unprotect-GUI-linux \
            gui.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: |
            Excel-Unprotect-GUI-windows.exe
            Excel-Unprotect-GUI-macos
            Excel-Unprotect-GUI-linux

  release:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    # CRITICAL FIX: Grants permissions to create/update releases
    permissions:
      contents: write
    steps:
      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Excel-Unprotect-GUI-windows.exe
            Excel-Unprotect-GUI-macos
            Excel-Unprotect-GUI-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
